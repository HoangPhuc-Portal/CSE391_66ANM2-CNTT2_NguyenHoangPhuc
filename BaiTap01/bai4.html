<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <h3>Basic Info</h3>
      <div class="row">
        <label for="">Employee</label>
        <span>9</span>
      </div>
      <div class="row">
        <label for="">Last Name</label>
        <span>Dodsworth</span>
      </div>
      <div class="row">
        <label for="">First Name</label>
        <input type="text" value="Anne" />
      </div>
      <div class="row">
        <label>Gender</label>
        <div class="gender">
          <label><input type="radio" name="gender" />Male</label>
          <label><input type="radio" name="gender" />Female</label>
          <label><input type="radio" name="gender" />XXX</label>
          <label><input type="radio" name="gender" checked />ZZZ</label>
        </div>
      </div>
      <div class="row">
        <label for="">Title</label>
        <input type="text" value="Sales Representative" />
      </div>
      <div class="row">
        <label for="">Suffix</label>
        <input type="text" value="Ms." />
      </div>
      <div class="row">
        <label for="">BirthDate</label>
        <input type="datetime-local" />
      </div>
      <div class="row">
        <label for="">HireDate</label>
        <input type="datetime-local" />
      </div>
      <div class="row">
        <label for="">SSN (if applicable)</label>
        <input type="text" />
      </div>
      <div class="row">
        <label for="">Reports To</label>
        <select name="" id="">
          <option value="">Buchana</option>
        </select>
      </div>
      <h3>Contact Info</h3>
      <div class="row">
        <label>Email</label>
        <input type="email" placeholder="name@example.com" />
      </div>
      <div class="row">
        <label>Address</label>
        <input type="text" value="7 Houndstooth Rd." />
      </div>
      <div class="row">
        <label>City</label>
        <input type="email" value="London" />
      </div>
      <div class="row">
        <label>Region</label>
        <input type="email" />
      </div>
      <div class="row">
        <label>Postal Code</label>
        <input type="email" value="WG2 7LT" />
      </div>
      <div class="row">
        <label>country</label>
        <select name="" id="">
          <option value="">Russian Federation</option>
        </select>
      </div>
      <div class="row">
        <label>US Home Phone</label>
        <input type="text" value="(234)234-2342" />
      </div>
      <div class="row">
        <label>Photo</label>
        <input type="text" value="EmpID9.bmp" />
      </div>
      <h3>Optional Info</h3>
      <div class="row">
        <label for="">Notes</label>
        <textarea name="" id="">
Anne has a BA degree in English from St. Lawrence College.
She is fluent in French and German.ZZZ</textarea
        >
      </div>
      <div class="row">
        <label for="">Preferred Shift</label>
        <div class="checkbox">
          <label for=""><input type="checkbox" />Regular</label>
          <label for=""><input type="checkbox" checked />Gray Yard</label>
        </div>
      </div>
      <div class="row">
        <label for="">Active?</label>
        <input type="checkbox" checked />
      </div>
      <div class="row">
        <label>Are you human?</label>
        <div>
          <div class="captcha">TIDANO</div>
          <p style="text-align: center"><b>Click to Change</b></p>
          <input type="text" style="width: 20vw" />
        </div>
      </div>
      <div class="buttons">
        <div>
          <button type="button"><</button>
          <button type="button">></button>
        </div>
        <div>
          <button type="submit">Submit</button>
          <button type="button">Cancel</button>
        </div>
      </div>

      <div class="required">* required</div>
    </form>
  </body>
</html>
