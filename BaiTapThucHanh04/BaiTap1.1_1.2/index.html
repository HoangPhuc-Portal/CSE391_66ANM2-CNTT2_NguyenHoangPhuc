<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div id="enter-infor">
      <input type="text" id="enter-name" placeholder="Enter your name" />
      <input type="text" id="enter-mark" placeholder="Enter your mark" />
      <button type="button" id="btn-add">Thêm</button>
    </div>
    <div id="filter-bar">
      <input
        type="text"
        id="search-name"
        placeholder="🔍 Tìm kiếm theo tên..."
      />
      <select id="filter-loai">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
      </select>
    </div>
    <table id="display-infor">
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="col-diem" style="cursor: pointer">Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="thong-ke">
      <span>Tổng số sinh viên: <strong id="tong-sv">0</strong></span>
      <span>Điểm trung bình: <strong id="diem-tb">0.00</strong></span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
